publisherName: Novo
serviceCategory: Financial Services
billingModel:
  pricingCategory: Free-with-Add-ons
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Novo Business Banking
  ServiceCategory: Financial Services
  ProviderName: Novo
  PublisherName: Novo
  InvoiceIssuerName: Middlesex Federal Savings, F.A.
  BillingCurrency: USD
