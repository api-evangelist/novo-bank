meters:
- name: monthly_account_fee
  description: Monthly business checking fee. Novo checking is free; this meter is $0.
  unit: account
  aggregation: sum
  dimensions:
  - account
- name: express_ach_payouts
  description: Faster ACH payouts billed per transfer when Express ACH is used.
  unit: transfers
  aggregation: sum
  dimensions:
  - account
- name: funding_fees
  description: Fixed fee/factor charged on Novo Funding cash advances, per advance.
  unit: advances
  aggregation: sum
  dimensions:
  - account
- name: wire_and_schedule_fees
  description: Outgoing wires, insufficient-funds, and other fee-schedule charges.
  unit: events
  aggregation: sum
  dimensions:
  - account
  - fee_type
- name: aggregator_data_access
  description: >-
    Third-party aggregator (e.g. Plaid) costs incurred by a developer
    connecting to Novo account/transaction data. Billed by the aggregator, not
    Novo.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - aggregator
principles:
- name: Visibility
  description: Review Novo statements and fee schedule; track add-on usage (Express ACH, Funding) and any aggregator costs separately.
- name: Allocation
  description: Tag transactions and reserves by project/client in Novo's bookkeeping; map fees to cost centers.
- name: Optimization
  description: Use standard (free) ACH instead of Express ACH when timing allows; weigh Funding fixed fees against need; avoid wire/NSF fees.
- name: Accountability
  description: Assign an owner to review the monthly fee and add-on spend against budget; reassess aggregator usage costs.
