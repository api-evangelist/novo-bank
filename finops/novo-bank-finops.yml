description: >-
  FinOps view of Novo. Novo business checking is free (no monthly fee, no
  minimum balance), so there is no usage-metered API spend to manage - Novo
  publishes no public developer API. Cost exposure comes from optional add-on
  products and standard banking fees: Express ACH faster payouts, Novo Funding
  cash advances (fixed-fee/factor), outgoing wires, insufficient-funds and
  similar fee-schedule items, and any aggregator costs (e.g. Plaid) incurred by
  a developer connecting to Novo data. Charges are modeled as Usage and
  Purchase categories accordingly.
notes: >-
  Add-on and fee-schedule rates change; verify against Novo's pricing and fee
  schedule during reconciliation. Banking services provided by Middlesex
  Federal Savings, F.A. There is no first-party API meter because no public API
  exists.
sources:
- https://www.novo.co/
- https://www.novo.co/business-banking
