aid: novo-bank
url: https://raw.githubusercontent.com/api-evangelist/novo-bank/refs/heads/main/apis.yml
name: Novo
kind: company
description: Novo is a U.S. business banking platform built for small businesses,
  freelancers, and self-employed professionals, offering a free business checking
  account, invoicing, reserves, AI-assisted bookkeeping, a business credit card, and
  funding. Banking services are provided by Middlesex Federal Savings, F.A. Novo does
  not publish a public self-service developer API; programmatic access to Novo
  account data is currently delivered through third-party aggregators (Plaid), and
  product integrations connect Novo accounts to tools like Stripe, Shopify,
  QuickBooks, Xero, Wise, and Square.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Banking
- Business Banking
- Fintech
- Small Business
- Freelancers
- Payments
created: '2026-06-20'
modified: '2026-06-20'
