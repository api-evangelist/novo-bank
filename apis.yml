apis:
- aid: novo-bank:novo-accounts
  name: Novo Accounts
  tags:
  - Accounts
  - Balances
  - Banking
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.novo.co/business-banking
  properties:
  - url: https://www.novo.co/business-banking
    type: Documentation
  - url: https://plaid.com/institutions/novo/
    type: APIReference
  - url: openapi/novo-bank-openapi.yml
    type: OpenAPI
  description: Novo business checking account data - account identity, balances, and
    auth. Novo does not expose a public first-party Accounts API; account
    connectivity is provided through the Plaid aggregator (Assets, Auth, Balance
    products). Modeled here as a product surface, not a documented Novo endpoint.
- aid: novo-bank:novo-transactions
  name: Novo Transactions
  tags:
  - Transactions
  - Statements
  - Reconciliation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.novo.co/business-banking
  properties:
  - url: https://www.novo.co/business-banking
    type: Documentation
  - url: https://plaid.com/institutions/novo/
    type: APIReference
  - url: openapi/novo-bank-openapi.yml
    type: OpenAPI
  description: Novo transaction history and categorization used for bookkeeping and
    reconciliation. There is no documented public Novo Transactions API; transaction
    data is accessed via aggregators such as Plaid, or synced into accounting tools
    through Novo's productized integrations.
- aid: novo-bank:novo-payments
  name: Novo Payments
  tags:
  - Payments
  - ACH
  - Invoicing
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.novo.co/features/invoices
  properties:
  - url: https://www.novo.co/features/invoices
    type: Documentation
  - url: openapi/novo-bank-openapi.yml
    type: OpenAPI
  description: Novo money movement - invoicing, ACH transfers, and faster payouts
    (Express ACH). These capabilities are delivered through the Novo app and partner
    rails; no public payments API is documented for third-party developers. Modeled
    as a product surface.
- aid: novo-bank:novo-integrations
  name: Novo Integrations
  tags:
  - Integrations
  - Partners
  - Accounting
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.novo.co/integrations
  properties:
  - url: https://www.novo.co/integrations
    type: Documentation
  - url: https://www.novo.co/features/stripe-integration
    type: Documentation
  description: Productized, prebuilt integrations that connect a Novo account to
    business tools - Stripe, Shopify, Square, Amazon, Etsy, eBay, Wise, QuickBooks,
    Xero, Slack, and DocuSign. These are configured in-app rather than via a public
    developer API, so no OpenAPI is modeled for this surface.
