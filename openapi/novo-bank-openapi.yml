openapi: 3.0.1
info:
  title: Novo API
  description: >-
    Novo (novo.co) is a U.S. business banking platform for small businesses and
    freelancers, with banking services provided by Middlesex Federal Savings,
    F.A. As of this writing, Novo does NOT publish a public, self-service
    developer API, developer portal (e.g. developer.novo.co), or webhook
    infrastructure for third-party developers. Programmatic access to Novo
    account, balance, and transaction data is obtained through bank-data
    aggregators - primarily Plaid (supporting the Assets, Auth, and Balance
    products) - rather than a first-party Novo REST API. Novo's "integrations"
    are productized, in-app connections to tools like Stripe, Shopify, Square,
    QuickBooks, Xero, and Wise, not a developer-facing API surface. Because no
    Novo endpoints are publicly documented, this specification intentionally
    declares an empty `paths` object. No endpoints are fabricated. This profile
    covers Novo the SMB bank and is distinct from Novo Nordisk, NovoPayment
    (developer.novopayment.com), and Novo Banco (api.novobanco.es).
  termsOfService: https://www.novo.co/legal/terms
  contact:
    name: Novo Support
    url: https://www.novo.co/support
  version: '0.0'
servers:
  - url: https://www.novo.co
    description: >-
      Novo marketing and product site. There is no documented public API base
      URL; this entry is a placeholder for the company web origin only.
paths: {}
